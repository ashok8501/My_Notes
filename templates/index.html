<!DOCTYPE html>
<html>
<head>
<title>Student Notes App</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #eef2f7;
    font-size: 16px;
}

.navbar {
    background: linear-gradient(90deg,#4f46e5,#3b82f6);
    color: white;
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
}

.profile {
    position: relative;
    cursor: pointer;
}

.profile img {
    width: 35px;
    border-radius: 50%;
}

.dropdown {
    position: absolute;
    right: 0;
    top: 45px;
    background: white;
    padding: 10px;
    border-radius: 8px;
    display: none;
}

.container {
    max-width: 700px;
    width: 95%;
    margin: 20px auto;
    padding: 10px;
}

.card {
    background: white;
    padding: 18px;
    border-radius: 12px;
    margin-bottom: 15px;
}

.section { display: none; }
.active { display: block; }

input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    font-size: 14px;
}

button {
    padding: 8px 12px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    margin-left: 5px;
    font-size: 14px;
}

.primary { background:#4f46e5; color:white; width: 100%; }
.view { background:#22c55e; color:white; }
.delete { background:#ef4444; color:white; }

.note {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
}

.note div:last-child {
    margin-top: 8px;
    display: flex;
    flex-wrap: wrap;
}

.auth-box {
    max-width: 350px;
    width: 90%;
    margin: 40px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

.tabs {
    display: flex;
    margin-bottom: 10px;
}

.tabs button { flex: 1; }

.active-tab {
    background: #4f46e5;
    color: white;
}

.msg { margin-top: 10px; }

.menu {
    display:none;
    position:absolute;
    right:0;
    background:white;
    padding:10px;
    border-radius:8px;
}

/* Mobile */
@media (max-width: 600px) {

    h3 {
        font-size: 18px;
    }

    .card {
        padding: 12px;
    }

    button {
        width: 100%;
        margin-top: 5px;
    }

    .navbar div span {
        display: block;
        margin: 5px 0;
    }
}
</style>

</head>

<body>

<div id="navbar" class="navbar" style="display:none;">
    <div>
        <span onclick="showSection('upload')">Upload</span>
        <span onclick="showSection('notes')" style="margin-left:10px;">Notes</span>
        <span onclick="showSection('about')" style="margin-left:10px;">About</span>
    </div>

    <div class="profile" onclick="toggleDropdown()">
        <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
        <div id="dropdown" class="dropdown">
            <p id="userEmail"></p>
            <button onclick="logout()">Logout</button>
        </div>
    </div>
</div>

<div id="auth" class="auth-box">

    <div class="tabs">
        <button onclick="switchTab('login')" class="active-tab">Login</button>
        <button onclick="switchTab('signup')">Signup</button>
    </div>

    <div id="loginForm">
        <input id="loginEmail" placeholder="Email">
        <input id="loginPassword" type="password" placeholder="Password">
        <button class="primary" onclick="login()">Login</button>
    </div>

    <div id="signupForm" style="display:none;">
        <input id="signupEmail" placeholder="Email">
        <input id="signupPassword" type="password" placeholder="Password">
        <button class="primary" onclick="signup()">Signup</button>
    </div>

    <p id="msg"></p>
</div>

<div id="app" class="container" style="display:none;">

    <!-- Upload -->
    <div id="upload" class="section active card">
        <h3>Upload Notes</h3>
        <input id="title" placeholder="Title">
        <input id="subject" placeholder="Enter Subject">
        <input type="file" id="file">
        <button class="primary" onclick="upload()">Upload</button>
        <p id="uploadMsg"></p>
    </div>

    <!-- Notes -->
    <div id="notes" class="section card">

        <div style="display:flex; justify-content:space-between;">
            <h3>Notes</h3>

            <div style="position:relative;">
                <span onclick="toggleMenu()">⋮</span>

                <div id="menuDropdown" class="menu">
                    <p onclick="showBookmarks()">⭐ Bookmarks</p>
                    <p onclick="loadNotes()">All Notes</p>
                </div>
            </div>
        </div>

        <input id="searchInput" placeholder="Search..." onkeyup="filterNotes()">

        <div id="notesList"></div>
    </div>

    <!-- About -->
    <div id="about" class="section card">
        <h3>About</h3>
        <p>
        The Student Notes App helps students organize, store, and access notes easily.
        Group by subject, bookmark important files, and quickly view or download anytime.
        </p>
    </div>

</div>

<script>
let userId="";
let allNotes=[];

function switchTab(tab){
    loginForm.style.display = tab==="login"?"block":"none";
    signupForm.style.display = tab==="signup"?"block":"none";
}

function toggleDropdown(){
    dropdown.style.display = dropdown.style.display==="block"?"none":"block";
}

function toggleMenu(){
    menuDropdown.style.display = menuDropdown.style.display==="block"?"none":"block";
}

function showSection(id){
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");

    if(id==="notes") loadNotes();
}

async function signup(){
    let res = await fetch("/auth/signup",{
        method:"POST",
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({email: signupEmail.value,password: signupPassword.value})
    });

    let data = await res.json();
    msg.innerText = data.detail || "Signup successful";
}

async function login(){
    let res = await fetch("/auth/login",{
        method:"POST",
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({email: loginEmail.value,password: loginPassword.value})
    });

    let data = await res.json();

    if(!res.ok){
        msg.innerText = data.detail;
        return;
    }

    userId = data.user_id;

    auth.style.display="none";
    app.style.display="block";
    navbar.style.display="flex";

    userEmail.innerText = data.email;
}

function logout(){
    auth.style.display="block";
    app.style.display="none";
    navbar.style.display="none";
}

async function upload(){
    if(!title.value || !subject.value || !file.files[0]){
        uploadMsg.innerText = "Fill all fields";
        return;
    }

    uploadMsg.innerText = "Uploading...";

    let f = new FormData();
    f.append("title",title.value);
    f.append("subject",subject.value);
    f.append("file",file.files[0]);
    f.append("user_id",userId);

    let res = await fetch("/notes/upload",{method:"POST",body:f});

    if(res.ok){
        uploadMsg.innerText = "Uploaded successfully ✅";
        title.value=""; subject.value=""; file.value="";
        loadNotes();
    } else {
        uploadMsg.innerText = "Upload failed ❌";
    }
}

async function loadNotes(){
    let res = await fetch(`/notes/user/${userId}`);
    let data = await res.json();
    allNotes = data;
    renderNotes(data);
}

function renderNotes(notes){
    let grouped = {};

    notes.forEach(n=>{
        let sub = n.subject || "General";
        if(!grouped[sub]) grouped[sub]=[];
        grouped[sub].push(n);
    });

    let html="";

    for(let subject in grouped){
        html += `<h4>📁 ${subject}</h4>`;

        grouped[subject].forEach(n=>{
            html+=`
            <div class="card note">
                <div>${n.title}</div>
                <div>
                    <span onclick="toggleBookmark('${n.id}')">${n.is_bookmarked?"⭐":"☆"}</span>
                    <button onclick="view('${n.id}')">View</button>
                    <button onclick="downloadFile('${n.id}')">Download</button>
                    <button onclick="del('${n.id}')">Delete</button>
                </div>
            </div>`;
        });
    }

    notesList.innerHTML=html;
}

async function toggleBookmark(id){
    let res = await fetch(`/notes/bookmark/${id}`,{method:"PUT"});
    let data = await res.json();

    allNotes = allNotes.map(n=>{
        if(n.id===id) n.is_bookmarked=data.is_bookmarked;
        return n;
    });

    renderNotes(allNotes);
}

function filterNotes(){
    let k = searchInput.value.toLowerCase();
    renderNotes(allNotes.filter(n=>n.title.toLowerCase().includes(k)));
}

function showBookmarks(){
    renderNotes(allNotes.filter(n=>n.is_bookmarked));
}

function view(id){
    let url = window.location.origin + `/notes/view/${id}`;
    window.open(`https://docs.google.com/gview?embedded=true&url=${url}`);
}

function downloadFile(id){
    window.open(`/notes/download/${id}`);
}

async function del(id){
    await fetch(`/notes/delete/${id}`,{method:"DELETE"});
    loadNotes();
}
</script>

</body>
</html>
